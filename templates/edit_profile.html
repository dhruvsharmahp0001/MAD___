{% extends "base.html" %}
{% block content %}

<h3>Update Profile</h3>

<form method="POST">

<div class="mb-3">
<label>Name</label>
<input type="text" name="name"
value="{{ student.name }}"
class="form-control" required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone"
value="{{ student.phone }}"
class="form-control" required>
</div>

<button class="btn btn-success">
Update
</button>

<a href="/student" class="btn btn-secondary">
Cancel
</a>

</form>

{% endblock %}
