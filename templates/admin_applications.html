{% extends "base.html" %}
{% block content %}

<h3>All Applications</h3>

<table class="table table-bordered">
<tr>
<th>ID</th>
<th>Student</th>
<th>Drive</th>
<th>Status</th>
</tr>

{% for a in applications %}
<tr>
<td>{{ a.application_uid }}</td>
<td>{{ a.name }}</td>
<td>{{ a.job_title }}</td>
<td>{{ a.status }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
