{% extends "base.html" %}
{% block content %}

<h3>Edit Company Profile</h3>

<form method="POST">

<div class="mb-3">
<label>Company Name</label>
<input type="text" name="company_name"
value="{{ company.company_name }}"
class="form-control">
</div>

<div class="mb-3">
<label>HR Contact</label>
<input type="text" name="hr_contact"
value="{{ company.hr_contact }}"
class="form-control">
</div>

<div class="mb-3">
<label>Website</label>
<input type="text" name="website"
value="{{ company.website }}"
class="form-control">
</div>

<button class="btn btn-success">
Update
</button>

</form>

{% endblock %}
